version: '3.8'

services:
  # ============================================================
  # CONTAINER 1: LIVE — Sadece LONG islemler (hedef: $500 → $2000)
  # ============================================================
  trading-live:
    build: .
    image: trading-bot:latest
    container_name: trading-bot-live
    restart: unless-stopped
    environment:
      - TRADING_MODE=live
      - BOT_MODE=long_only
      - ALPACA_KEY_PREFIX=LIVE
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/live:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # CONTAINER 2: PAPER — Long + Short (test & pratik)
  # ============================================================
  trading-short:
    image: trading-bot:latest
    depends_on:
      trading-live:
        condition: service_started
    container_name: trading-bot-paper
    restart: unless-stopped
    environment:
      - TRADING_MODE=paper
      - BOT_MODE=both
      - ALPACA_KEY_PREFIX=PAPER
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/short:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
