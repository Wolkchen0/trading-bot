version: '3.8'

services:
  # ============================================================
  # CONTAINER 1: LIVE — Sadece LONG islemler ($500 canli para)
  # ============================================================
  trading-live:
    build: .
    container_name: trading-bot-live
    restart: unless-stopped
    environment:
      - TRADING_MODE=live
      - BOT_MODE=long_only
      - ALPACA_API_KEY=${ALPACA_LIVE_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_LIVE_SECRET_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - MARKETAUX_TOKEN=${MARKETAUX_TOKEN:-}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/live:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # CONTAINER 2: PAPER — Sadece SHORT islemler ($2000 sanal)
  # ============================================================
  trading-short:
    build: .
    container_name: trading-bot-short
    restart: unless-stopped
    environment:
      - TRADING_MODE=paper
      - BOT_MODE=short_only
      - ALPACA_API_KEY=${ALPACA_PAPER_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_PAPER_SECRET_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - MARKETAUX_TOKEN=${MARKETAUX_TOKEN:-}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/short:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
